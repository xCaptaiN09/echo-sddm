[General]

# Background type: "pure" (black) | "frosted" (wallpaper + blur)
type=pure

# Login mode: "select" (arrow key user/session picker) | "tty" (type username, F1/F2 session)
login_mode=select

# Wallpaper path — required when type=frosted
# Can be absolute or relative to theme directory
# Example: background=assets/backgrounds/background.png
background=assets/backgrounds/background.png

# Monospace font (must be installed on system)
font=JetBrains Mono

# Font size in pixels
font_size=14

# Boot animation speed — milliseconds per line
boot_interval=72

# Clock format: true = 24h (14:30) | false = 12h (2:30 PM)
use_24h=false

# Terminal window background opacity (frosted only) 0.0=transparent 1.0=opaque
background_opacity=0.35

# Blur strength (frosted only) 0=no blur 100=heavy
blur_radius=54
